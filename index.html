<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>幸福內容工廠 v1.1 一鍵生成版</title>
<style>
:root{
  --bg:#fffaf5;
  --card:#ffffff;
  --card-soft:#fff7ef;
  --primary:#f0a04b;
  --primary-dark:#dd8d37;
  --secondary:#8fc8a9;
  --text:#3b2f2a;
  --sub:#8b6f5a;
  --line:#f1dfcb;
  --danger:#d45b52;
  --ok:#2f9e6f;
  --shadow:0 10px 30px rgba(80,52,24,.08);
  --radius:20px;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
}
body{padding-bottom:100px}
.wrap{
  max-width:980px;
  margin:0 auto;
  padding:18px;
}
.hero{
  background:linear-gradient(135deg,#fff1df,#fffaf5);
  border:1px solid var(--line);
  border-radius:28px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}
.hero h1{
  margin:0;
  font-size:32px;
}
.hero p{
  margin:8px 0 0;
  color:var(--sub);
  line-height:1.6;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}
.section-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
}
.section-title h2{
  margin:0;
  font-size:22px;
}
.sub{
  color:var(--sub);
  font-size:13px;
}
.grid{
  display:grid;
  gap:12px;
}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}
label{
  font-size:13px;
  font-weight:700;
  color:var(--sub);
}
input,textarea,select{
  width:100%;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  background:#fff;
  color:var(--text);
  font-size:14px;
  outline:none;
}
input:focus,textarea:focus,select:focus{
  border-color:#f0a04b;
  box-shadow:0 0 0 4px rgba(240,160,75,.12);
}
textarea{
  min-height:110px;
  resize:vertical;
  line-height:1.6;
}
textarea.tall{min-height:180px}
textarea.xl{min-height:240px}
.btn-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
button{
  border:0;
  border-radius:14px;
  padding:12px 16px;
  background:var(--primary);
  color:#fff;
  font-weight:800;
  font-size:14px;
  cursor:pointer;
}
button:hover{background:var(--primary-dark)}
button.secondary{
  background:#fff1df;
  color:#a15a12;
}
button.ghost{
  background:#f7f3ee;
  color:#5e4b3f;
}
button.green{
  background:var(--secondary);
}
button.danger{
  background:var(--danger);
}
button[disabled]{
  opacity:.55;
  cursor:not-allowed;
}
.note{
  background:var(--card-soft);
  border:1px dashed #efd2b2;
  border-radius:16px;
  padding:12px;
  color:#7c614d;
  line-height:1.6;
  font-size:13px;
}
.status{
  font-size:13px;
  color:var(--sub);
  margin-top:10px;
  line-height:1.6;
}
.footer-bar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:rgba(255,250,245,.96);
  backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.footer-status{
  font-size:14px;
  font-weight:800;
  color:var(--sub);
}
.footer-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#fff1df;
  color:#9b5a19;
  font-size:12px;
  font-weight:800;
}
@media (max-width:900px){
  .grid-2,.grid-3{grid-template-columns:1fr}
  .hero h1{font-size:28px}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <span class="badge">一鍵生成版</span>
    <h1>幸福內容工廠</h1>
    <p>從故事出發，快速整理出長片骨架、發佈文案與可回填資料。這版是可直接操作、可直接寫入 GAS 的暖色實作版。</p>
  </div>

  <div class="card">
    <div class="section-title">
      <h2>系統設定</h2>
      <div class="sub">先確認 GAS 已連線</div>
    </div>
    <div class="grid grid-2">
      <div class="field">
        <label for="gasUrl">GAS Web App URL</label>
        <input id="gasUrl" value="https://script.google.com/macros/s/AKfycbxAKKRtJrhHllzrwfipcETbDwg3rkOLioj409-RTpJTsnNLYzvPARpvDzfFnLf-QRfNIA/exec">
      </div>
      <div class="field">
        <label for="contentMode">生成模式</label>
        <select id="contentMode">
          <option value="sat">週六教養故事</option>
          <option value="tue">週二心靈感悟</option>
          <option value="thu">週四心腦科學</option>
        </select>
      </div>
    </div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="ghost" id="btnPing">測試連線</button>
      <button class="ghost" id="btnLoadDraft">讀取草稿</button>
      <button class="ghost" id="btnSaveDraft">儲存草稿</button>
      <button class="danger" id="btnClear">清空</button>
    </div>
    <div class="status" id="systemStatus">尚未測試</div>
  </div>

  <div class="card">
    <div class="section-title">
      <h2>① 輸入故事</h2>
      <div class="sub">把原始素材放進來</div>
    </div>

    <div class="grid grid-3">
      <div class="field">
        <label for="storyId">story_id</label>
        <input id="storyId" placeholder="可留空，自動產生">
      </div>
      <div class="field">
        <label for="storyTitle">故事標題</label>
        <input id="storyTitle" placeholder="例如：孩子一哭，我差點也跟著炸掉">
      </div>
      <div class="field">
        <label for="topicGroup">主題分類</label>
        <input id="topicGroup" placeholder="例如：幸福教養 / 情緒安定">
      </div>
    </div>

    <div class="grid grid-2" style="margin-top:12px;">
      <div class="field">
        <label for="storyRaw">故事全文</label>
        <textarea id="storyRaw" class="xl" placeholder="貼上你的故事、感悟、逐字稿"></textarea>
      </div>
      <div class="field">
        <label for="redirectTool">導流工具</label>
        <input id="redirectTool" placeholder="例如：情緒急救30秒">
        <label for="scenarioType">情境</label>
        <input id="scenarioType" placeholder="例如：孩子崩潰 / 親子衝突">
        <label for="mainTool">主工具</label>
        <input id="mainTool" placeholder="例如：情緒急救卡">
        <label for="subTool">子工具</label>
        <input id="subTool" placeholder="例如：安定對話句">
        <label for="publishDate">日期</label>
        <input id="publishDate" type="date">
      </div>
    </div>

    <div class="btn-row" style="margin-top:12px;">
      <button id="btnAutoGenerate">一鍵生成今日內容</button>
      <button class="secondary" id="btnGenerateSummary">只重整摘要</button>
      <button class="secondary" id="btnGenerateVideo">只生長片</button>
      <button class="secondary" id="btnGeneratePublish">只生發佈文案</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">
      <h2>② 自動生成結果</h2>
      <div class="sub">可再手動微調</div>
    </div>

    <div class="grid grid-3">
      <div class="field">
        <label for="corePain">核心痛點</label>
        <textarea id="corePain"></textarea>
      </div>
      <div class="field">
        <label for="coreTurn">關鍵轉折</label>
        <textarea id="coreTurn"></textarea>
      </div>
      <div class="field">
        <label for="coreInsight">核心洞見</label>
        <textarea id="coreInsight"></textarea>
      </div>
    </div>

    <div class="grid grid-2" style="margin-top:12px;">
      <div class="field">
        <label for="videoTopic">長片主題</label>
        <input id="videoTopic" placeholder="自動生成後可修改">
      </div>
      <div class="field">
        <label for="publishTitle">發佈標題</label>
        <input id="publishTitle" placeholder="自動生成後可修改">
      </div>
    </div>

    <div class="grid grid-3" style="margin-top:12px;">
      <div class="field">
        <label for="versionOriginal">original</label>
        <textarea id="versionOriginal" class="tall"></textarea>
      </div>
      <div class="field">
        <label for="versionRevised">revised</label>
        <textarea id="versionRevised" class="tall"></textarea>
      </div>
      <div class="field">
        <label for="versionFinal">final_copy</label>
        <textarea id="versionFinal" class="tall" placeholder="最終定稿，空白就不能發佈"></textarea>
      </div>
    </div>

    <div class="btn-row" style="margin-top:12px;">
      <button class="ghost" id="btnOriginalToRevised">original → revised</button>
      <button class="ghost" id="btnRevisedToFinal">revised → final</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">
      <h2>③ Publish Factory</h2>
      <div class="sub">生成發佈標題、文案、Hashtags</div>
    </div>

    <div class="grid grid-2">
      <div class="field">
        <label for="publishShort">短文案</label>
        <textarea id="publishShort" class="tall"></textarea>
      </div>
      <div class="field">
        <label for="hashtags">Hashtags</label>
        <textarea id="hashtags" class="tall"></textarea>
      </div>
    </div>

    <div class="field" style="margin-top:12px;">
      <label for="publishCTA">CTA</label>
      <textarea id="publishCTA"></textarea>
    </div>

    <div class="note" style="margin-top:12px;">
      這版的「一鍵生成」是本地規則生成，目的是先讓你的流程跑起來、先有可編修的成品骨架。之後再把 NotebookLM 或 AI 協作指令真正接進來。
    </div>
  </div>

  <div class="card">
    <div class="section-title">
      <h2>④ 一鍵回填</h2>
      <div class="sub">寫入資料庫</div>
    </div>
    <div class="btn-row">
      <button class="green" id="btnSaveStory">寫入 stories_db</button>
      <button class="green" id="btnSaveVideo">寫入 video_generation</button>
      <button class="green" id="btnSavePublish">發佈到 publish_content</button>
      <button id="btnSaveAll">一鍵寫入三表</button>
    </div>
    <div class="status" id="writeStatus">尚未寫入</div>
  </div>

</div>

<div class="footer-bar">
  <div class="footer-status" id="footerStatus">請先輸入故事，再按一鍵生成</div>
  <div class="footer-actions">
    <button class="secondary" id="btnPreviewFlow">檢查內容</button>
    <button id="btnFinalPublish">正式發佈</button>
  </div>
</div>

<script>
const STORAGE_KEY = "happy_content_factory_v11";

const $ = (id) => document.getElementById(id);

function val(id){
  return ($(id)?.value || "").trim();
}

function setVal(id, value){
  if ($(id)) $(id).value = value || "";
}

function nowDate(){
  return new Date().toISOString().slice(0,10);
}

function makeId(prefix){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const da = String(d.getDate()).padStart(2,"0");
  const h = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  const s = String(d.getSeconds()).padStart(2,"0");
  const ms = String(d.getMilliseconds()).padStart(3,"0");
  return `${prefix}${y}${m}${da}${h}${mi}${s}${ms}`;
}

function ensureBaseDefaults(){
  if(!val("storyId")) setVal("storyId", makeId("S"));
  if(!val("publishDate")) setVal("publishDate", nowDate());
}

function saveDraft(){
  const ids = [
    "gasUrl","contentMode","storyId","storyTitle","topicGroup","storyRaw",
    "redirectTool","scenarioType","mainTool","subTool","publishDate",
    "corePain","coreTurn","coreInsight","videoTopic","publishTitle",
    "versionOriginal","versionRevised","versionFinal","publishShort",
    "hashtags","publishCTA"
  ];
  const data = {};
  ids.forEach(id => data[id] = val(id));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  setStatus("systemStatus", "草稿已儲存");
}

function loadDraft(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){
    setStatus("systemStatus", "目前沒有草稿");
    return;
  }
  try{
    const data = JSON.parse(raw);
    Object.keys(data).forEach(k => setVal(k, data[k]));
    updateFooter();
    setStatus("systemStatus", "草稿已讀取");
  }catch(err){
    setStatus("systemStatus", "草稿讀取失敗");
  }
}

function clearAll(){
  [
    "storyId","storyTitle","topicGroup","storyRaw","redirectTool","scenarioType","mainTool","subTool",
    "publishDate","corePain","coreTurn","coreInsight","videoTopic","publishTitle",
    "versionOriginal","versionRevised","versionFinal","publishShort","hashtags","publishCTA"
  ].forEach(id => setVal(id,""));
  ensureBaseDefaults();
  updateFooter();
  setStatus("systemStatus", "已清空");
  setStatus("writeStatus", "尚未寫入");
}

function setStatus(id, text){
  $(id).textContent = text;
}

async function callGAS(action, payload = {}, method = "POST"){
  const gasUrl = val("gasUrl");
  if(!gasUrl) throw new Error("請先填寫 GAS URL");

  if(method === "GET"){
    const url = new URL(gasUrl);
    url.searchParams.set("action", action);
    Object.entries(payload).forEach(([k,v])=>{
      if(v !== undefined && v !== null && v !== "") url.searchParams.set(k, String(v));
    });
    const res = await fetch(url.toString());
    const text = await res.text();
    return JSON.parse(text);
  }

  const res = await fetch(gasUrl, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ action, ...payload })
  });
  const text = await res.text();
  return JSON.parse(text);
}

async function ping(){
  try{
    const res = await callGAS("ping", {}, "GET");
    setStatus("systemStatus", res.ok ? `✅ 連線成功｜${res.version}` : "❌ 連線失敗");
  }catch(err){
    setStatus("systemStatus", `❌ 連線失敗｜${err.message}`);
  }
}

function splitSentences(text){
  return String(text || "")
    .replace(/\n+/g, " ")
    .split(/[。！？!?]/)
    .map(s => s.trim())
    .filter(Boolean);
}

function firstLine(text){
  const lines = String(text || "").split("\n").map(s => s.trim()).filter(Boolean);
  return lines[0] || "";
}

function summarizeStory(raw){
  const parts = splitSentences(raw);
  const first = parts[0] || raw.slice(0,30);
  const second = parts[1] || "我原本以為要先處理問題，後來才發現要先穩住自己。";
  const third = parts[2] || "當我慢下來，關係也開始鬆動。";

  return {
    pain: `${first}，背後真正困難的不是表面事件，而是當下情緒一下子被拉高。`,
    turn: `${second}，轉折點不是孩子立刻改變，而是大人先停下來、先穩住。`,
    insight: `${third}，很多時候關係能變好，不是因為更會說，而是先不被情緒帶走。`
  };
}

function generateVideoTopic(mode, title, insight){
  if(mode === "sat") return title || `當孩子情緒來時，大人怎麼先穩住自己`;
  if(mode === "tue") return title || `你不是太脆弱，你只是撐太久了`;
  return title || `情緒一來時，大腦和身體其實發生了什麼`;
}

function generateOriginal(mode, title, raw, pain, turn, insight, tool){
  const opening = mode === "sat"
    ? `【開頭】\n有時候最難的，不是孩子哭，而是孩子一哭，我心裡也跟著亂了。`
    : mode === "tue"
    ? `【開頭】\n你以為自己是太脆弱，其實你只是撐太久了。`
    : `【開頭】\n當情緒突然上來時，你不是故意失控，而是整個系統正在自動保護你。`;

  const scene = `\n\n【情境】\n${firstLine(raw) || raw}`;
  const painBlock = `\n\n【痛點】\n${pain}`;
  const turnBlock = `\n\n【轉折】\n${turn}`;
  const insightBlock = `\n\n【洞見】\n${insight}`;
  const toolBlock = tool ? `\n\n【導流】\n這時候，不一定要立刻講很多話，先用「${tool}」把自己安定下來。` : "";

  return `${opening}${scene}${painBlock}${turnBlock}${insightBlock}${toolBlock}`;
}

function generatePublish(title, insight, tool, mode){
  const short = mode === "sat"
    ? `孩子的情緒來得快，大人的心更容易一起被捲進去。這支內容想陪你練習一件事：先穩住自己，再陪孩子走過去。`
    : mode === "tue"
    ? `你不是不好，你只是太久沒有被好好接住。當你願意慢下來，很多卡住的情緒就開始鬆了。`
    : `情緒來時，不只是「想太多」，很多時候是身體和大腦一起進入保護模式。懂了，就比較不會一直怪自己。`;

  const cta = tool
    ? `想把今天這份安定帶進生活裡，可以先從「${tool}」開始。`
    : `如果你也正在練習把自己安定下來，這支內容想陪你一起走。`;

  const tags = mode === "sat"
    ? "#幸福教養 #親子溝通 #情緒教養 #大人先穩定"
    : mode === "tue"
    ? "#心靈感悟 #情緒陪伴 #自我安定 #溫柔練習"
    : "#心腦科學 #情緒調節 #神經系統 #理解自己";

  return {
    publishTitle: title,
    publishShort: `${short}\n\n${insight}`,
    hashtags: tags,
    cta
  };
}

function autoGenerateAll(){
  ensureBaseDefaults();

  const raw = val("storyRaw");
  const title = val("storyTitle");
  const mode = val("contentMode");
  const tool = val("redirectTool");

  if(!raw){
    updateFooter("請先貼入故事內容");
    return;
  }

  const summary = summarizeStory(raw);
  setVal("corePain", summary.pain);
  setVal("coreTurn", summary.turn);
  setVal("coreInsight", summary.insight);

  const topic = generateVideoTopic(mode, title, summary.insight);
  setVal("videoTopic", topic);
  setVal("publishTitle", topic);

  const original = generateOriginal(mode, topic, raw, summary.pain, summary.turn, summary.insight, tool);
  setVal("versionOriginal", original);

  if(!val("versionRevised")) setVal("versionRevised", original);

  const pub = generatePublish(topic, summary.insight, tool, mode);
  setVal("publishTitle", pub.publishTitle);
  setVal("publishShort", pub.publishShort);
  setVal("hashtags", pub.hashtags);
  setVal("publishCTA", pub.cta);

  updateFooter("已完成一鍵生成，請檢查後再定稿");
  saveDraft();
}

function generateSummaryOnly(){
  const raw = val("storyRaw");
  if(!raw){
    updateFooter("請先貼入故事內容");
    return;
  }
  const summary = summarizeStory(raw);
  setVal("corePain", summary.pain);
  setVal("coreTurn", summary.turn);
  setVal("coreInsight", summary.insight);
  updateFooter("已重整摘要");
}

function generateVideoOnly(){
  const mode = val("contentMode");
  const topic = generateVideoTopic(mode, val("storyTitle"), val("coreInsight"));
  setVal("videoTopic", topic);
  setVal("publishTitle", topic);
  setVal("versionOriginal", generateOriginal(
    mode, topic, val("storyRaw"), val("corePain"), val("coreTurn"), val("coreInsight"), val("redirectTool")
  ));
  updateFooter("已生成長片骨架");
}

function generatePublishOnly(){
  const topic = val("videoTopic") || val("storyTitle");
  const pub = generatePublish(topic, val("coreInsight"), val("redirectTool"), val("contentMode"));
  setVal("publishTitle", pub.publishTitle);
  setVal("publishShort", pub.publishShort);
  setVal("hashtags", pub.hashtags);
  setVal("publishCTA", pub.cta);
  updateFooter("已生成發佈文案");
}

function moveOriginalToRevised(){
  setVal("versionRevised", val("versionOriginal"));
  updateFooter("已帶入 revised");
}

function moveRevisedToFinal(){
  setVal("versionFinal", val("versionRevised"));
  updateFooter();
}

function updateFooter(custom){
  if(custom){
    $("footerStatus").textContent = custom;
    return;
  }
  $("footerStatus").textContent = val("versionFinal")
    ? "可發佈｜final_copy 已完成"
    : "尚未發佈｜請先完成 final_copy";
  $("btnFinalPublish").disabled = !val("versionFinal");
}

function buildStoryPayload(){
  return {
    id: val("storyId") || makeId("S"),
    content_type: "story",
    title: val("storyTitle"),
    story_content: val("storyRaw"),
    core_summary: [val("corePain"), val("coreTurn"), val("coreInsight")].filter(Boolean).join("\n"),
    core_pain: val("corePain"),
    core_insight: val("coreInsight"),
    keywords: `${val("topicGroup")}, ${val("scenarioType")}`.trim(),
    main_theme: val("topicGroup"),
    brain_tag: val("contentMode") === "thu" ? "TRUE" : "FALSE",
    tool_potential: val("mainTool") ? "TRUE" : "FALSE",
    publish_status: val("versionFinal") ? "ready" : "draft",
    main_tool: val("mainTool"),
    sub_tool: val("subTool"),
    ext_tool: val("redirectTool"),
    priority: "",
    topic_group: val("topicGroup"),
    topic_tags: "",
    scenario_type: val("scenarioType"),
    shorts_potential: "7",
    publish_date: val("publishDate"),
    video_url: "",
    story_remaining: "",
    story_alert: "",
    brain_stock: "",
    insight_stock: "",
    shorts_stock: "",
    channel_stock: "",
    viral_short: "",
    shorts_topic: "",
    shorts_script: "",
    shorts_hook: "",
    video_priority: "",
    today_task: "",
    weekly_schedule: "",
    date: val("publishDate"),
    video_theme: val("videoTopic")
  };
}

function buildVideoPayload(){
  return {
    video_id: makeId("VD"),
    week_no: "",
    video_type: "long",
    content_id: `CT-${val("storyId")}`,
    story_id: val("storyId"),
    video_title: val("videoTopic"),
    shorts_title: "",
    core_message: val("coreInsight"),
    script_outline: val("versionOriginal"),
    ai_image_prompt: "",
    redirect_tool: val("redirectTool"),
    publish_status: val("versionFinal") ? "ready" : "draft",
    ai_prompt: "",
    ai_long_copy: "",
    output_storage: "",
    video_url: "",
    shorts_urls: "",
    revised_copy: val("versionRevised"),
    final_copy: val("versionFinal"),
    version_log: `updated ${new Date().toLocaleString()}`,
    is_locked: "FALSE",
    shorts_prompt: "",
    publish_fill_prompt: ""
  };
}

function buildPublishPayload(){
  return {
    publish_id: makeId("PB"),
    content_id: `CT-${val("storyId")}`,
    video_id: "",
    platform: "youtube",
    title: val("publishTitle") || val("videoTopic"),
    full_text: val("versionFinal"),
    short_text: val("publishShort"),
    hashtags: val("hashtags"),
    cta: val("publishCTA"),
    link: "",
    status: val("versionFinal") ? "ready" : "draft",
    video_url: "",
    final_copy: val("versionFinal")
  };
}

async function appendRow(sheet, data){
  const result = await callGAS("appendRow", { sheet, data }, "POST");
  if(!result.ok) throw new Error(result.error || "寫入失敗");
  return result;
}

async function saveStory(){
  ensureBaseDefaults();
  const result = await appendRow("stories_db", buildStoryPayload());
  setStatus("writeStatus", `stories_db 寫入成功｜row ${result.row_number}`);
  updateFooter("已寫入 stories_db");
}

async function saveVideo(){
  ensureBaseDefaults();
  const result = await appendRow("video_generation", buildVideoPayload());
  setStatus("writeStatus", `video_generation 寫入成功｜row ${result.row_number}`);
  updateFooter("已寫入 video_generation");
}

async function savePublish(){
  ensureBaseDefaults();
  if(!val("versionFinal")){
    updateFooter("❌ final_copy 不能空白");
    return;
  }
  const result = await appendRow("publish_content", buildPublishPayload());
  setStatus("writeStatus", `publish_content 寫入成功｜row ${result.row_number}`);
  updateFooter("已寫入 publish_content");
}

async function saveAll(){
  try{
    await saveStory();
    await saveVideo();
    if(val("versionFinal")) await savePublish();
    else updateFooter("故事與長片已寫入；發佈略過，因為 final_copy 為空");
  }catch(err){
    updateFooter(`寫入失敗：${err.message}`);
  }
}

function previewFlow(){
  const missing = [];
  if(!val("storyRaw")) missing.push("故事");
  if(!val("corePain")) missing.push("核心痛點");
  if(!val("videoTopic")) missing.push("長片主題");
  if(!val("versionOriginal")) missing.push("original");
  if(!val("versionFinal")) missing.push("final_copy");
  updateFooter(missing.length ? `尚缺：${missing.join("、")}` : "內容已齊，可發佈");
}

function bind(){
  $("btnPing").addEventListener("click", ping);
  $("btnLoadDraft").addEventListener("click", loadDraft);
  $("btnSaveDraft").addEventListener("click", saveDraft);
  $("btnClear").addEventListener("click", clearAll);

  $("btnAutoGenerate").addEventListener("click", autoGenerateAll);
  $("btnGenerateSummary").addEventListener("click", generateSummaryOnly);
  $("btnGenerateVideo").addEventListener("click", generateVideoOnly);
  $("btnGeneratePublish").addEventListener("click", generatePublishOnly);

  $("btnOriginalToRevised").addEventListener("click", moveOriginalToRevised);
  $("btnRevisedToFinal").addEventListener("click", moveRevisedToFinal);

  $("btnSaveStory").addEventListener("click", () => saveStory().catch(err => updateFooter(`寫入失敗：${err.message}`)));
  $("btnSaveVideo").addEventListener("click", () => saveVideo().catch(err => updateFooter(`寫入失敗：${err.message}`)));
  $("btnSavePublish").addEventListener("click", () => savePublish().catch(err => updateFooter(`寫入失敗：${err.message}`)));
  $("btnSaveAll").addEventListener("click", saveAll);

  $("btnPreviewFlow").addEventListener("click", previewFlow);
  $("btnFinalPublish").addEventListener("click", () => savePublish().catch(err => updateFooter(`發佈失敗：${err.message}`)));

  ["storyRaw","storyTitle","corePain","coreTurn","coreInsight","videoTopic","versionOriginal","versionRevised","versionFinal","publishShort","hashtags","publishCTA"]
    .forEach(id => {
      $(id).addEventListener("input", () => {
        saveDraft();
        updateFooter();
      });
    });
}

ensureBaseDefaults();
bind();
updateFooter();
</script>
</body>
</html>
