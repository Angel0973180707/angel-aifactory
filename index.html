<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI內容工廠 PWA v1（AI引擎版）</title>

<style>
body{font-family:sans-serif;background:#f5f6fa;margin:0}
.container{max-width:1200px;margin:auto;padding:20px}
.section{background:#fff;padding:16px;margin-bottom:16px;border-radius:12px}
textarea{width:100%;min-height:80px;margin-top:6px}
button{margin:4px;padding:6px 10px;border:none;border-radius:6px;background:#6c63ff;color:#fff}
.secondary{background:#ddd;color:#000}
.publish-bar{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;border-top:1px solid #ccc;display:flex;justify-content:space-between}
.disabled{background:#ccc!important}
.prompt-box{background:#f1f1ff;padding:10px;border-radius:8px;margin-top:6px;font-size:12px;white-space:pre-wrap}
</style>
</head>

<body>
<div class="container">
<h2>AI內容工廠（AI引擎版）</h2>

<!-- 收素材 -->
<div class="section">
<h3>① 收素材（KLM理解）</h3>
<button onclick="copyPrompt('klm')">KLM分析</button>
<div class="prompt-box" id="klm_box"></div>
<textarea id="input_raw" placeholder="貼上故事"></textarea>
</div>

<!-- 做內容 -->
<div class="section">
<h3>② 做內容（AI生成）</h3>

<button onclick="copyPrompt('tue')">週二｜心靈感悟</button>
<button onclick="copyPrompt('thu')">週四｜心腦科學</button>
<button onclick="copyPrompt('sat')">週六｜教養故事</button>

<div class="prompt-box" id="main_prompt"></div>

<textarea id="content_ai" placeholder="AI結果"></textarea>

<h4>版本</h4>
<textarea id="content_original" placeholder="original"></textarea>
<textarea id="content_revised" placeholder="revised"></textarea>
<textarea id="content_final" placeholder="final"></textarea>

<button onclick="saveToSheet('video_generation')">回填影片表</button>
</div>

<!-- Shorts -->
<div class="section">
<h3>③ Shorts生成</h3>
<button onclick="copyPrompt('shorts')">Shorts指令</button>
<div class="prompt-box" id="shorts_box"></div>
<textarea id="shorts_data"></textarea>
</div>

<!-- 發佈 -->
<div class="section">
<h3>④ 發佈文案</h3>
<button onclick="copyPrompt('publish')">發佈文案</button>
<div class="prompt-box" id="publish_box"></div>
<textarea id="publish_data"></textarea>
</div>

</div>

<div class="publish-bar">
<div id="status">尚未完成</div>
<button id="publishBtn" class="disabled" onclick="publish()">發佈</button>
</div>

<script>
// ===== GAS =====
const GAS_URL = "👉貼上你的GAS網址";

// ===== API =====
async function callGAS(action, params={}){
  const url = new URL(GAS_URL);
  url.searchParams.set("action", action);
  Object.entries(params).forEach(([k,v])=>{
    if(v!==undefined) url.searchParams.set(k,v);
  });

  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text);
}

async function appendRow(sheet,data){
  return await callGAS("appendRow",{sheet,data:JSON.stringify(data)});
}

// ===== AI指令庫 =====
const prompts = {

klm: `
請將以下故事做KLM分析：

1. 核心痛點（K）
2. 關鍵轉折（L）
3. 深層洞見（M）
4. 可轉內容方向（短片 / 長片 / 工具）
`,

tue: `
你是情緒療癒型內容創作者

請將內容轉為：

【週二心靈感悟】
- 溫柔
- 有畫面
- 可共感

輸出：
1. 標題
2. 內文（短影片）
3. 7段分鏡
`,

thu: `
你是心腦科學講解者

請轉為：

【週四心腦科學】
結合：
- 杏仁核
- 前額葉
- 神經系統

輸出：
1. 標題
2. 解釋（白話）
3. 應用場景
4. 7段短片
`,

sat: `
你是教養故事創作者

請轉為：

【週六教養故事】
結構：
1. 衝突
2. 情緒
3. 轉折
4. 引導句（家長可用）

輸出完整腳本
`,

shorts: `
請生成7支Shorts：

每支包含：
- Hook（3秒）
- 故事
- 收尾
- CTA
`,

publish: `
請生成發佈文案：

- 標題
- 短文
- hashtags
- CTA導流
`
};

// ===== 顯示 + 複製 =====
function copyPrompt(key){
  const text = prompts[key];
  navigator.clipboard.writeText(text);
  showPrompt(key, text);
  alert("已複製");
}

function showPrompt(key,text){
  if(key==="klm") document.getElementById("klm_box").innerText=text;
  if(["tue","thu","sat"].includes(key)) document.getElementById("main_prompt").innerText=text;
  if(key==="shorts") document.getElementById("shorts_box").innerText=text;
  if(key==="publish") document.getElementById("publish_box").innerText=text;
}

// ===== 回填 =====
async function saveToSheet(sheet){
  const data = {
    ai: document.getElementById("content_ai").value,
    final: document.getElementById("content_final").value,
    created_at: new Date().toISOString()
  };
  await appendRow(sheet,data);
  alert("回填成功");
}

// ===== 發佈防呆 =====
function checkPublish(){
  const final = document.getElementById("content_final").value.trim();
  const btn = document.getElementById("publishBtn");

  if(!final){
    btn.classList.add("disabled");
    document.getElementById("status").innerText="❌ final為空";
  }else{
    btn.classList.remove("disabled");
    document.getElementById("status").innerText="✅ 可發佈";
  }
}

document.getElementById("content_final").addEventListener("input",checkPublish);

// ===== 發佈 =====
async function publish(){
  const final = document.getElementById("content_final").value;

  if(!final){
    alert("禁止發佈");
    return;
  }

  await appendRow("publish_content",{
    full_text:final,
    created_at:new Date().toISOString()
  });

  alert("✅ 已發佈");
}

checkPublish();
</script>
</body>
</html>
