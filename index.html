<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI內容工廠 PWA v1</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --primary:#6c63ff;
  --text:#1f2937;
  --sub:#6b7280;
  --line:#e5e7eb;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

.section{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  margin-bottom:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.05);
}

.section-title{
  font-weight:700;
  margin-bottom:12px;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

button{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

button.secondary{
  background:#e5e7eb;
  color:#111;
}

textarea{
  width:100%;
  min-height:80px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
  margin-top:6px;
}

.block{
  margin-top:12px;
}

.label{
  font-size:12px;
  color:var(--sub);
}

.version-box{
  display:flex;
  gap:10px;
}

.version{
  flex:1;
}

.publish-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  padding:10px;
  border-top:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.disabled{
  background:#ccc !important;
  cursor:not-allowed;
}
</style>
</head>

<body>

<div class="container">
<h1>AI內容工廠 PWA v1</h1>

<!-- 1 收素材 -->
<div class="section" data-section="input">
  <div class="section-title">1. 收素材</div>

  <div class="row">
    <button onclick="copyPrompt('story_analysis')">故事分析</button>
    <button onclick="copyPrompt('insight_parse')">感悟解析</button>
  </div>

  <div class="block">
    <div class="label">NotebookLM貼上</div>
    <textarea id="input_raw"></textarea>
  </div>

  <div class="block">
    <button onclick="saveVersion('input')">存版本</button>
  </div>
</div>

<!-- 2 做內容 -->
<div class="section" data-section="content">
  <div class="section-title">2. 做內容</div>

  <div class="row">
    <button onclick="copyPrompt('ai_topic')">AI選題</button>
    <button onclick="copyPrompt('shorts')">Shorts生成</button>
  </div>

  <div class="block">
    <div class="label">AI結果</div>
    <textarea id="content_ai"></textarea>
  </div>

  <div class="block version-box">
    <div class="version">
      <div class="label">Original</div>
      <textarea id="content_original"></textarea>
    </div>
    <div class="version">
      <div class="label">Revised</div>
      <textarea id="content_revised"></textarea>
    </div>
    <div class="version">
      <div class="label">Final</div>
      <textarea id="content_final"></textarea>
    </div>
  </div>

  <button onclick="saveVersion('content')">存版本</button>
</div>

<!-- 3 排節奏 -->
<div class="section" data-section="schedule">
  <div class="section-title">3. 排節奏</div>

  <div class="row">
    <button onclick="copyPrompt('weekly_plan')">排程生成</button>
  </div>

  <div class="block">
    <textarea id="schedule_data"></textarea>
  </div>

  <button onclick="saveVersion('schedule')">存版本</button>
</div>

<!-- 4 長工具 -->
<div class="section" data-section="tool">
  <div class="section-title">4. 長工具</div>

  <div class="row">
    <button onclick="copyPrompt('tool_generate')">工具生成</button>
  </div>

  <div class="block">
    <textarea id="tool_data"></textarea>
  </div>

  <button onclick="saveVersion('tool')">存版本</button>
</div>

</div>

<!-- 發佈區 -->
<div class="publish-bar">
  <div id="publishStatus">尚未完成</div>
  <button id="publishBtn" class="disabled" onclick="publish()">發佈</button>
</div>

<script>
// ===== Prompt庫 =====
const prompts = {
  story_analysis: "請分析故事：核心痛點、轉折、洞見",
  insight_parse: "請解析感悟並轉為可用內容",
  ai_topic: "請生成3個可爆內容主題",
  shorts: "請生成7段Shorts分鏡",
  weekly_plan: "請生成12週排程",
  tool_generate: "請轉為工具模型"
};

// ===== 複製指令 =====
function copyPrompt(key){
  navigator.clipboard.writeText(prompts[key]);
  alert("已複製指令");
}

// ===== 版本系統 =====
function saveVersion(section){
  const data = collectSection(section);
  localStorage.setItem("version_"+section, JSON.stringify(data));
  alert("已存版本");
}

// ===== 收集資料 =====
function collectSection(section){
  if(section==="input"){
    return {
      raw: document.getElementById("input_raw").value
    };
  }

  if(section==="content"){
    return {
      original: document.getElementById("content_original").value,
      revised: document.getElementById("content_revised").value,
      final: document.getElementById("content_final").value
    };
  }

  if(section==="schedule"){
    return {
      data: document.getElementById("schedule_data").value
    };
  }

  if(section==="tool"){
    return {
      data: document.getElementById("tool_data").value
    };
  }
}

// ===== 發佈防呆 =====
function checkPublish(){
  const final = document.getElementById("content_final").value.trim();
  const btn = document.getElementById("publishBtn");
  const status = document.getElementById("publishStatus");

  if(final === ""){
    btn.classList.add("disabled");
    status.innerText = "❌ final_copy 為空，禁止發佈";
  }else{
    btn.classList.remove("disabled");
    status.innerText = "✅ 可發佈";
  }
}

document.getElementById("content_final").addEventListener("input", checkPublish);

// ===== 發佈 =====
function publish(){
  const final = document.getElementById("content_final").value.trim();
  if(final===""){
    alert("禁止發佈");
    return;
  }

  // GAS API 預留
  fetch("/gas-api",{
    method:"POST",
    body: JSON.stringify({
      action:"publish",
      final_copy: final
    })
  });

  alert("已發佈（模擬）");
}

// ===== 初始化 =====
checkPublish();

</script>

</body>
</html>
